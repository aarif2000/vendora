default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: localhost
  port: 5432
  username: postgres
  password: developer

development:
  <<: *default
  database: vendora_development

test:
  <<: *default
  database: vendora_test

production:
  <<: *default
  database: vendora_production
  username: vendora
  password: <%= ENV["VENDORA_DATABASE_PASSWORD"] %>